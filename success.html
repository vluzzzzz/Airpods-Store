<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago exitoso — AirPods Store</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'DM Sans',sans-serif; background:#f5f5f7; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card{ background:#fff; border-radius:24px; padding:48px 40px; text-align:center; max-width:420px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
    .icon{ font-size:64px; margin-bottom:24px; }
    h1{ font-size:26px; font-weight:700; color:#1d1d1f; margin-bottom:12px; }
    p{ font-size:15px; color:#6e6e73; line-height:1.6; margin-bottom:28px; }
    a{ display:inline-block; padding:14px 32px; background:#1d1d1f; color:#fff; border-radius:12px; text-decoration:none; font-size:14px; font-weight:500; transition:background 0.2s; }
    a:hover{ background:#333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>¡Pago aprobado!</h1>
    <p>Tu pedido fue recibido correctamente. Te contactaremos por WhatsApp para coordinar la entrega.</p>
    <a href="/">Volver a la tienda</a>
  </div>
</body>
</html>
